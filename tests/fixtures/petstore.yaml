openapi: "3.0.3"
info:
  title: Petstore
  description: >
    A minimal OpenAPI 3.0 Petstore specification used as a test fixture
    for mcp_forge unit and integration tests.
  version: "1.0.0"
  contact:
    name: Petstore Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://petstore.example.com/v1
    description: Production server

security:
  - bearerAuth: []

tags:
  - name: pets
    description: Everything about your Pets

paths:
  /pets:
    get:
      summary: List all pets
      description: Returns a list of all pets, optionally filtered by status and limited in count.
      operationId: listPets
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          description: Maximum number of pets to return.
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
          example: 10
        - name: status
          in: query
          description: Filter pets by status.
          required: false
          schema:
            type: string
            enum:
              - available
              - pending
              - sold
          example: available
      responses:
        "200":
          description: A list of pets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        "400":
          description: Bad request – invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized – missing or invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a pet
      description: Creates a new pet in the store.
      operationId: createPet
      tags:
        - pets
      requestBody:
        description: Pet object to be created.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "201":
          description: Pet created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Bad request – validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /pets/{petId}:
    get:
      summary: Get a pet by ID
      description: Returns a single pet identified by its unique integer ID.
      operationId: getPetById
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          description: The unique identifier of the pet.
          required: true
          schema:
            type: integer
            format: int64
          example: 42
      responses:
        "200":
          description: A single pet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: Update a pet
      description: Replaces an existing pet's data with the provided payload.
      operationId: updatePet
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          description: The unique identifier of the pet to update.
          required: true
          schema:
            type: integer
            format: int64
          example: 42
      requestBody:
        description: Updated pet data.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "200":
          description: Pet updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Pet not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete a pet
      description: Permanently removes a pet from the store by its ID.
      operationId: deletePet
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          description: The unique identifier of the pet to delete.
          required: true
          schema:
            type: integer
            format: int64
          example: 42
      responses:
        "204":
          description: Pet deleted – no content returned.
        "404":
          description: Pet not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token authentication.

    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key passed in the X-API-Key request header.

  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the pet.
          example: 42
        name:
          type: string
          description: The name of the pet.
          example: Fido
        status:
          type: string
          description: Availability status of the pet.
          enum:
            - available
            - pending
            - sold
          example: available
        tag:
          type: string
          description: Optional tag or breed label.
          example: labrador

    NewPet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the new pet.
          example: Buddy
        status:
          type: string
          description: Initial availability status.
          enum:
            - available
            - pending
            - sold
          default: available
          example: available
        tag:
          type: string
          description: Optional tag or breed label.
          example: golden retriever

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: HTTP-compatible error code.
          example: 404
        message:
          type: string
          description: Human-readable error description.
          example: Pet not found
